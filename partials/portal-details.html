<div class="bg-white rounded-2xl border shadow-sm">
  <!-- Header -->
  <div class="px-6 py-4 border-b flex items-center justify-between gap-3">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">My Details</h2>
      <p class="text-sm text-gray-600 mt-1">Manage your personal information and preferences</p>
    </div>
    <div class="flex items-center gap-3">
      <span
        id="detailsSaveStatusTop"
        class="hidden text-sm"
        style="color: #60a5fa;"
        aria-live="polite"
      >
        Saved
      </span>
      <button
        type="submit"
        form="clientDetailsForm"
        class="px-5 py-2.5 btn-primary rounded-lg font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
        Save
      </button>
    </div>
  </div>

  <!-- Form -->
  <form id="clientDetailsForm" class="p-6 space-y-6" novalidate>
    
    <!-- Personal Information -->
    <div>
      <h3 class="text-lg font-semibold text-gray-900 mb-4">Personal Information</h3>
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="firstName">
            First Name <span class="text-red-500">*</span>
          </label>
          <input 
            type="text" 
            id="firstName" 
            name="first_name"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-black focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            required
          />
          <p id="firstNameError" class="text-xs text-red-500 mt-1 hidden"></p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="lastName">
            Last Name <span class="text-red-500">*</span>
          </label>
          <input 
            type="text" 
            id="lastName" 
            name="last_name"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-black focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            required
          />
          <p id="lastNameError" class="text-xs text-red-500 mt-1 hidden"></p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="mobile">
            Mobile Number <span class="text-red-500">*</span>
          </label>
          <input 
            type="tel" 
            id="mobile" 
            name="mobile"
            placeholder="04XX XXX XXX"
            inputmode="tel"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-black focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            required
          />
          <p id="mobileError" class="text-xs text-red-500 mt-1 hidden"></p>
          <p class="text-xs text-gray-500 mt-1">For lesson reminders and updates</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="learnerPermitNumber">
            License/Permit Number
          </label>
          <input 
            type="text" 
            id="learnerPermitNumber" 
            name="learner_permit_number"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-black focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
          <p id="learnerPermitNumberError" class="text-xs text-red-500 mt-1 hidden"></p>
        </div>
      </div>
    </div>

    <!-- Emergency Contact -->
    <div class="pt-6 border-t">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">Emergency Contact</h3>
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="emergencyContactName">
            Contact Name
          </label>
          <input 
            type="text" 
            id="emergencyContactName" 
            name="emergency_contact_name"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-black focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
          <p id="emergencyContactNameError" class="text-xs text-red-500 mt-1 hidden"></p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="emergencyContactPhone">
            Contact Phone
          </label>
          <input 
            type="tel" 
            id="emergencyContactPhone" 
            name="emergency_contact_phone"
            inputmode="tel"
            placeholder="0403 632 313 or (03) 9876 5432"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-black focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
          <p id="emergencyContactPhoneError" class="text-xs text-red-500 mt-1 hidden"></p>
        </div>
      </div>
    </div>

    <!-- Medical & Learning Needs -->
    <div class="pt-6 border-t">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">Medical & Learning Information</h3>
      
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2" for="medicalConditions">
          Medical Conditions
        </label>
        <textarea 
          id="medicalConditions" 
          name="medical_conditions"
          rows="3"
          placeholder="Please list any medical conditions we should be aware of (e.g., epilepsy, diabetes, anxiety)"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-black focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        ></textarea>
        <p id="medicalConditionsError" class="text-xs text-red-500 mt-1 hidden"></p>
        <p class="text-xs text-gray-500 mt-1">This information helps us provide better support during lessons</p>
      </div>

      <div class="space-y-3">
        <label class="flex items-start gap-3 cursor-pointer">
          <input 
            type="checkbox" 
            id="isBeginner" 
            name="is_beginner"
            class="mt-1 w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <div>
            <span class="text-sm font-medium text-gray-900">I am a complete beginner</span>
            <p class="text-xs text-gray-500">We'll start with the basics and build your confidence</p>
          </div>
        </label>

        <label class="flex items-start gap-3 cursor-pointer">
          <input 
            type="checkbox" 
            id="isAnxiousNervous" 
            name="is_anxious_nervous"
            class="mt-1 w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <div>
            <span class="text-sm font-medium text-gray-900">I am an anxious or nervous driver</span>
            <p class="text-xs text-gray-500">We'll provide extra support and patience</p>
          </div>
        </label>

        <label class="flex items-start gap-3 cursor-pointer">
          <input 
            type="checkbox" 
            id="isSenior" 
            name="is_senior"
            class="mt-1 w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <div>
            <span class="text-sm font-medium text-gray-900">I am a senior driver</span>
            <p class="text-xs text-gray-500">We'll provide help and support as you prepare for a retest</p>
          </div>
        </label>
      </div>

      <div class="mt-4">
        <label class="flex items-start gap-3 cursor-pointer">
          <input 
            type="checkbox" 
            id="hasOtherLearningNeeds" 
            name="has_other_learning_needs"
            class="mt-1 w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
            onchange="toggleOtherLearningNeeds()"
          />
          <div class="flex-1">
            <span class="text-sm font-medium text-gray-900">I have other learning needs or preferences</span>
            <p class="text-xs text-gray-500 mb-2">Please tell us anything else that would help us tailor your lessons</p>
            <input 
              type="text" 
              id="learningNeedsOther" 
              name="learning_needs_other"
              disabled
              placeholder="Please specify..."
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent disabled:bg-gray-100 disabled:cursor-not-allowed"
            />
            <p id="learningNeedsOtherError" class="text-xs text-red-500 mt-1 hidden"></p>
          </div>
        </label>
      </div>
    </div>

    <!-- Notes -->
    <div class="pt-6 border-t">
      <label class="block text-sm font-medium text-gray-700 mb-2" for="notes">
        Additional Notes
      </label>
      <textarea 
        id="notes" 
        name="notes"
        rows="3"
        placeholder="Any other information you'd like to share"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-black focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      ></textarea>
      <p id="notesError" class="text-xs text-red-500 mt-1 hidden"></p>
    </div>

    <!-- Action Buttons -->
    <div class="flex items-center gap-3 pt-6">
      <button 
        type="submit" 
        class="px-6 py-3 btn-primary rounded-lg font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
      >
        Save
      </button>
      <span
        id="detailsSaveStatusBottom"
        class="hidden text-sm"
        style="color: #60a5fa;"
        aria-live="polite"
      >
        Saved
      </span>
    </div>

    <p class="text-xs text-gray-500">
      <span class="text-red-500">*</span> Required fields
    </p>
  </form>
</div>

<script>
  // Duplicate load prevention flag
  let detailsLoaded = false;

  // Helper: Load client details with duplicate prevention and session check
  async function loadClientDetailsIfAllowed() {
    // Prevent duplicate loads
    if (detailsLoaded) {
      return;
    }

    // Check password-changed session before loading protected data (with timeout)
    if (window.AuthUI && window.AuthUI.checkPasswordChangedSession) {
      const sessionValid = window.AuthUI.checkPasswordChangedSessionWithTimeout
        ? await window.AuthUI.checkPasswordChangedSessionWithTimeout(8000)
        : await window.AuthUI.checkPasswordChangedSession();
      if (!sessionValid) {
        console.warn('[portal-details] Stale session detected, aborting load');
        return;
      }
    }

    // Ensure data is available
    if (!window.clientData) {
      return;
    }

    loadClientDetails();
    detailsLoaded = true;
  }

  // Load client details when data is available (event-based timing)
  window.addEventListener('clientDataLoaded', async function(e) {
    await loadClientDetailsIfAllowed();
  });

  // Also check immediately in case data already exists (data-already-present timing)
  if (window.clientData) {
    loadClientDetailsIfAllowed();
  }

  // Toggle other learning needs text input
  function toggleOtherLearningNeeds() {
    const checkbox = document.getElementById('hasOtherLearningNeeds');
    const textbox = document.getElementById('learningNeedsOther');
    textbox.disabled = !checkbox.checked;
    if (checkbox.checked) {
      textbox.focus();
    } else {
      textbox.value = '';
    }
  }
  window.toggleOtherLearningNeeds = toggleOtherLearningNeeds;

  // Per-field validation on blur
  document.getElementById('mobile').addEventListener('blur', function(){
    const v = this.value.trim();
    if (!v) {
      showError('mobile','mobileError','Mobile number is required');
    } else if (!window.Validation || !Validation.isValidAuMobile || !Validation.isValidAuMobile(v)) {
      showError('mobile','mobileError','Enter a valid AU mobile (e.g. 04XX XXX XXX or +61 4XX XXX XXX)');
    } else {
      clearError('mobile','mobileError');
      // Don't reformat - store what user entered
    }
  });
  document.getElementById('emergencyContactPhone').addEventListener('blur', function(){
    const v = this.value.trim();
    if (!v) { 
      clearError('emergencyContactPhone','emergencyContactPhoneError'); 
      return; 
    }

    const ok = window.Validation && Validation.isValidAuPhone && Validation.isValidAuPhone(v);

    if (!ok) {
      showError('emergencyContactPhone','emergencyContactPhoneError','Enter a valid Australian mobile (04XX XXX XXX) or landline (0X XXXX XXXX)');
    } else {
      clearError('emergencyContactPhone','emergencyContactPhoneError');
      // Don't reformat - store what user entered
    }
  });

  // Clear errors when user types (input event listeners)
  document.getElementById('firstName').addEventListener('input', () =>
    clearError('firstName','firstNameError')
  );

  document.getElementById('lastName').addEventListener('input', () =>
    clearError('lastName','lastNameError')
  );

  document.getElementById('mobile').addEventListener('input', () =>
    clearError('mobile','mobileError')
  );

  document.getElementById('emergencyContactPhone').addEventListener('input', () =>
    clearError('emergencyContactPhone','emergencyContactPhoneError')
  );

  document.getElementById('learnerPermitNumber').addEventListener('input', () =>
    clearError('learnerPermitNumber','learnerPermitNumberError')
  );

  document.getElementById('emergencyContactName').addEventListener('input', () =>
    clearError('emergencyContactName','emergencyContactNameError')
  );

  document.getElementById('medicalConditions').addEventListener('input', () =>
    clearError('medicalConditions','medicalConditionsError')
  );

  document.getElementById('learningNeedsOther').addEventListener('input', () =>
    clearError('learningNeedsOther','learningNeedsOtherError')
  );

  document.getElementById('notes').addEventListener('input', () =>
    clearError('notes','notesError')
  );

  function loadClientDetails() {
    if (!window.clientData) return;

    const data = window.clientData;
    
    // Populate form fields
    document.getElementById('firstName').value = data.first_name || '';
    document.getElementById('lastName').value = data.last_name || '';
    document.getElementById('mobile').value = data.mobile || '';
    document.getElementById('learnerPermitNumber').value = data.learner_permit_number || '';
    document.getElementById('emergencyContactName').value = data.emergency_contact_name || '';
    document.getElementById('emergencyContactPhone').value = data.emergency_contact_phone || '';
    document.getElementById('medicalConditions').value = data.medical_conditions || '';
    document.getElementById('isAnxiousNervous').checked = data.is_anxious_nervous || false;
    document.getElementById('isBeginner').checked = data.is_beginner || false;
    document.getElementById('isSenior').checked = data.is_senior || false;
    
    // Handle other learning needs checkbox and text
    const hasOther = data.learning_needs_other ? true : false;
    document.getElementById('hasOtherLearningNeeds').checked = hasOther;
    document.getElementById('learningNeedsOther').value = data.learning_needs_other || '';
    document.getElementById('learningNeedsOther').disabled = !hasOther;
    
    document.getElementById('notes').value = data.notes || '';
  }

  // XSS Protection Helpers
  function containsHtmlTags(value) {
    return /<[^>]+>/.test(value);
  }

  function containsSuspiciousScriptPattern(value) {
    return /<script|<img|<svg|<iframe|javascript:|srcdoc\s*=|onerror\s*=|onload\s*=|onmouseover\s*=|onfocus\s*=|onpageshow\s*=|eval\s*\(|document\.cookie/i.test(value);
  }

  function containsBlockedContent(value) {
    return value && (containsHtmlTags(value) || containsSuspiciousScriptPattern(value));
  }

  // Input normalization helper - removes invisible characters
  function normalizeInput(value) {
    if (!value) return value;
    return value
      .replace(/\u200B/g, '')   // zero-width space
      .replace(/\u200C/g, '')
      .replace(/\u200D/g, '')
      .trim();
  }

  // Validation helper functions
  function showError(fieldId, errorId, message, shouldScroll = true) {
    const field = document.getElementById(fieldId);
    const error = document.getElementById(errorId);
    
    if (!field || !error) {
      console.error('[portal-details] Field or error element not found:', fieldId, errorId);
      return;
    }
    
    field.classList.add('border-red-400');
    error.textContent = message;
    error.classList.remove('hidden');
    
    // Scroll to this field if requested
    if (shouldScroll) {
      field.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  function clearError(fieldId, errorId) {
    const field = document.getElementById(fieldId);
    const error = document.getElementById(errorId);
    
    if (!field || !error) return;
    
    field.classList.remove('border-red-400');
    error.classList.add('hidden');
  }

  function validateClientDetailsForm(){
    // Clear all errors first
    clearError('firstName', 'firstNameError');
    clearError('lastName', 'lastNameError');
    clearError('mobile', 'mobileError');
    clearError('emergencyContactPhone', 'emergencyContactPhoneError');
    clearError('learnerPermitNumber', 'learnerPermitNumberError');
    clearError('emergencyContactName', 'emergencyContactNameError');
    clearError('medicalConditions', 'medicalConditionsError');
    clearError('learningNeedsOther', 'learningNeedsOtherError');
    clearError('notes', 'notesError');

    let hasError = false;
    let firstInvalidField = null;

    const first = normalizeInput(document.getElementById('firstName').value);
    const last  = normalizeInput(document.getElementById('lastName').value);
    const mobile= normalizeInput(document.getElementById('mobile').value);
    const ePhone= normalizeInput(document.getElementById('emergencyContactPhone').value);
    const learnerPermit = normalizeInput(document.getElementById('learnerPermitNumber').value);
    const emergencyName = normalizeInput(document.getElementById('emergencyContactName').value);
    const medicalConditions = normalizeInput(document.getElementById('medicalConditions').value);
    const learningNeedsOther = normalizeInput(document.getElementById('learningNeedsOther').value);
    const notes = normalizeInput(document.getElementById('notes').value);

    // Required field validation
    if (!first) { 
      showError('firstName', 'firstNameError', 'First name is required', false); 
      if (!firstInvalidField) firstInvalidField = 'firstName';
      hasError = true; 
    } else if (containsBlockedContent(first)) {
      // XSS Protection - Only check if field has content
      showError('firstName', 'firstNameError', 'HTML or script content is not allowed. Please enter plain text only.', false);
      if (!firstInvalidField) firstInvalidField = 'firstName';
      hasError = true;
    }
    
    if (!last) { 
      showError('lastName', 'lastNameError', 'Last name is required', false); 
      if (!firstInvalidField) firstInvalidField = 'lastName';
      hasError = true; 
    } else if (containsBlockedContent(last)) {
      // XSS Protection - Only check if field has content
      showError('lastName', 'lastNameError', 'HTML or script content is not allowed. Please enter plain text only.', false);
      if (!firstInvalidField) firstInvalidField = 'lastName';
      hasError = true;
    }
    
    // XSS Protection - Check other fields with inline errors
    if (learnerPermit && containsBlockedContent(learnerPermit)) {
      showError('learnerPermitNumber', 'learnerPermitNumberError', 'HTML or script content is not allowed. Please enter plain text only.', false);
      if (!firstInvalidField) firstInvalidField = 'learnerPermitNumber';
      hasError = true;
    }
    if (emergencyName && containsBlockedContent(emergencyName)) {
      showError('emergencyContactName', 'emergencyContactNameError', 'HTML or script content is not allowed. Please enter plain text only.', false);
      if (!firstInvalidField) firstInvalidField = 'emergencyContactName';
      hasError = true;
    }
    if (medicalConditions && containsBlockedContent(medicalConditions)) {
      showError('medicalConditions', 'medicalConditionsError', 'HTML or script content is not allowed. Please enter plain text only.', false);
      if (!firstInvalidField) firstInvalidField = 'medicalConditions';
      hasError = true;
    }
    if (learningNeedsOther && containsBlockedContent(learningNeedsOther)) {
      showError('learningNeedsOther', 'learningNeedsOtherError', 'HTML or script content is not allowed. Please enter plain text only.', false);
      if (!firstInvalidField) firstInvalidField = 'learningNeedsOther';
      hasError = true;
    }
    if (notes && containsBlockedContent(notes)) {
      showError('notes', 'notesError', 'HTML or script content is not allowed. Please enter plain text only.', false);
      if (!firstInvalidField) firstInvalidField = 'notes';
      hasError = true;
    }
    
    // Mobile validation - must be valid
    if (!mobile) { 
      showError('mobile', 'mobileError', 'Mobile number is required', false); 
      if (!firstInvalidField) firstInvalidField = 'mobile';
      hasError = true; 
    } else if (!window.Validation || !Validation.isValidAuMobile || !Validation.isValidAuMobile(mobile)) { 
      showError('mobile', 'mobileError', 'Enter a valid AU mobile (e.g. 04XX XXX XXX or +61 4XX XXX XXX)', false); 
      if (!firstInvalidField) firstInvalidField = 'mobile';
      hasError = true; 
    }
    
    // Emergency phone validation - must be valid if provided
    if (ePhone) {
      const isValid = window.Validation && Validation.isValidAuPhone && Validation.isValidAuPhone(ePhone);
      if (!isValid) {
        showError('emergencyContactPhone', 'emergencyContactPhoneError', 'Enter a valid Australian mobile or landline', false);
        if (!firstInvalidField) firstInvalidField = 'emergencyContactPhone';
        hasError = true;
      }
    }

    // Scroll to first invalid field once
    if (firstInvalidField) {
      const firstField = document.getElementById(firstInvalidField);
      if (firstField) {
        firstField.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    return !hasError;
  }
  window.validateClientDetailsForm = validateClientDetailsForm;

  // Handle form submission
  document.getElementById('clientDetailsForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    // Validate all fields; block save if invalid
    if (!validateClientDetailsForm()) {
      return;
    }

    if (!window.supabaseClient || !window.currentUser) {
      Modal.error('Not authenticated. Please log in again.');
      return;
    }

    // Check password-changed session before saving protected data (with timeout)
    if (window.AuthUI && window.AuthUI.checkPasswordChangedSession) {
      const sessionValid = window.AuthUI.checkPasswordChangedSessionWithTimeout
        ? await window.AuthUI.checkPasswordChangedSessionWithTimeout(8000)
        : await window.AuthUI.checkPasswordChangedSession();
      if (!sessionValid) {
        console.warn('[portal-details] Stale session detected, aborting save');
        return;
      }
    }

    // Collect form data - store trimmed raw values (no normalisation for storage)
    const mobileRaw = normalizeInput(document.getElementById('mobile').value);
    const emergencyPhoneRaw = normalizeInput(document.getElementById('emergencyContactPhone').value);
    
    const formData = {
      first_name: normalizeInput(document.getElementById('firstName').value),
      last_name: normalizeInput(document.getElementById('lastName').value),
      mobile: mobileRaw,
      learner_permit_number: normalizeInput(document.getElementById('learnerPermitNumber').value) || null,
      emergency_contact_name: normalizeInput(document.getElementById('emergencyContactName').value) || null,
      emergency_contact_phone: emergencyPhoneRaw || null,
      medical_conditions: normalizeInput(document.getElementById('medicalConditions').value) || null,
      is_anxious_nervous: document.getElementById('isAnxiousNervous').checked,
      is_beginner: document.getElementById('isBeginner').checked,
      is_senior: document.getElementById('isSenior').checked,
      learning_needs_other: document.getElementById('hasOtherLearningNeeds').checked ? normalizeInput(document.getElementById('learningNeedsOther').value) : null,
      notes: normalizeInput(document.getElementById('notes').value) || null,
      updated_at: new Date().toISOString()
    };

    try {
      const { data, error } = await window.supabaseClient
        .from('client')
        .update(formData)
        .eq('id', window.currentUser.id);

      if (error) throw error;

      // Update local data
      window.clientData = { ...window.clientData, ...formData };

      // Leave phone display as entered (no canonical formatting after save)

      if (window.showDetailsSavedMessage) {
        window.showDetailsSavedMessage();
      }
    } catch (err) {
      console.error('Error saving details:', err);
      Modal.error('Could not save your details. Please try again.', 'Save Failed');
    }
  });
</script>
